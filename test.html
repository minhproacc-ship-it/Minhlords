<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key System - Verify Access</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 40px 35px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .logo {
    width: 70px; height: 70px;
    margin: 0 auto 15px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #fff;
  }
  h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #777; font-size: 14px; margin-bottom: 25px; }

  .input-group { position: relative; margin-bottom: 15px; }
  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: 0.25s;
    text-align: center;
    letter-spacing: 1px;
  }
  input[type="text"]:focus { border-color: #667eea; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
    margin-top: 10px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: #f0f2ff;
    color: #667eea;
    border: 2px solid #667eea;
  }
  .btn-secondary:hover { background: #667eea; color: #fff; }

  .divider {
    margin: 20px 0 10px;
    color: #aaa;
    font-size: 13px;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: #e0e0e0;
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .message {
    margin-top: 18px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .message.success { background: #e6ffed; color: #1b7a3a; display: block; }
  .message.error   { background: #ffe6e6; color: #b30000; display: block; }
  .message.loading { background: #fff8e1; color: #8a6d00; display: block; }

  .footer { margin-top: 25px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑</div>
    <h1>Xác thực Key</h1>
    <p class="subtitle">Nhập key của bạn để truy cập nội dung</p>

    <div class="input-group">
      <input type="text" id="keyInput" placeholder="Nhập key tại đây..." autocomplete="off">
    </div>

    <button class="btn btn-primary" id="verifyBtn" onclick="verifyKey()">
      Xác thực Key
    </button>

    <div class="divider">hoặc</div>

    <button class="btn btn-secondary" onclick="getKey()">
      🎁 Nhận Key miễn phí
    </button>

    <div class="message" id="message"></div>

    <div class="footer">Powered by work.ink</div>
  </div>

<script>
  // ====== CẤU HÌNH ======
  const WORKINK_LINK = "https://work.ink/2m7a/awighiafisghaihsdfasfwr";
  const DESTINATION_URL = "https://minhlords.qzz.io";

  // Hiển thị thông báo
  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = 'message ' + type;
  }

  // Lấy key - mở link work.ink
  function getKey() {
    window.open(WORKINK_LINK, '_blank');
  }

  // Xác thực key qua API work.ink
  async function verifyKey() {
    const key = document.getElementById('keyInput').value.trim();
    const btn = document.getElementById('verifyBtn');

    if (!key) {
      showMessage('⚠️ Vui lòng nhập key!', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Đang kiểm tra...';
    showMessage('Đang xác thực với máy chủ...', 'loading');

    try {
      // Gọi API work.ink với proxy CORS
      const apiUrl = `https://work.ink/_api/v2/token/isValid/${key}?deleteToken=1`;
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
      
      const res = await fetch(proxyUrl);
      const data = await res.json();

      if (data.valid === true) {
        showMessage('✅ Key hợp lệ! Đang chuyển hướng...', 'success');
        setTimeout(() => {
          window.location.href = DESTINATION_URL;
        }, 1200);
      } else {
        showMessage('❌ Key không hợp lệ hoặc đã hết hạn!', 'error');
      }
    } catch (err) {
      console.error(err);
      showMessage('⚠️ Lỗi kết nối máy chủ. Vui lòng thử lại.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Xác thực Key';
    }
  }

  // Cho phép nhấn Enter để verify
  document.getElementById('keyInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyKey();
  });
</script>
</body>
</html>
