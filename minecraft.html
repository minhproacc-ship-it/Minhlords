<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MINHLORDS - Minecraft Server</title>
  <meta name="description" content="Join MINHLORDS Minecraft Server - Play now!">
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Minecraft-specific styles -->
  <style>
    .mc-hero { text-align: center; margin-bottom: 30px; }
    .mc-icon { font-size: 4rem; margin-bottom: 20px; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    
    .mc-server-card {
      background: rgba(25, 25, 55, 0.6);
      border-radius: 24px;
      padding: 30px 25px;
      margin: 20px 0;
      border: 1px solid rgba(57, 255, 20, 0.3);
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .mc-server-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(57, 255, 20, 0.4);
    }
    
    .mc-server-card h3 {
      font-family: 'Orbitron', sans-serif;
      color: #39ff14;
      margin-bottom: 20px;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .server-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0 25px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      background: #39ff14;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.2); }
    }
    
    .status-text { color: #39ff14; font-weight: 600; font-size: 1.1rem; }
    
    .version-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff66cc, #9d4edd);
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      margin: 10px 0;
    }
    
    .ip-label {
      color: #aaa;
      font-size: 1rem;
      margin: 20px 0 12px;
    }
    
    .copy-ip {
      background: rgba(57, 255, 20, 0.15);
      border: 2px dashed #39ff14;
      padding: 16px 24px;
      border-radius: 14px;
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: #39ff14;
      cursor: pointer;
      user-select: all;
      transition: all 0.3s;
      letter-spacing: 1px;
      display: inline-block;
      min-width: 200px;
    }
    
    .copy-ip:hover {
      background: rgba(57, 255, 20, 0.3);
      transform: scale(1.02);
    }
    
    .copy-ip.copied {
      background: rgba(0, 242, 255, 0.3);
      border-color: #00f2ff;
      color: #00f2ff;
    }
    
    .copy-hint {
      font-size: 0.9rem;
      color: #888;
      margin-top: 12px;
    }
    
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
      text-decoration: none;
      margin-bottom: 10px;
      font-size: 1.1rem;
      transition: color 0.3s;
    }
    .back-home:hover { color: #00f2ff; }
    
    @media (max-width: 640px) {
      .mc-server-card { padding: 25px 20px; }
      .copy-ip { font-size: 1.1rem; padding: 14px 20px; width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="container">
    <div class="card">
      
      <a href="index.html" class="back-home fade-up">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
      
      <div class="mc-hero fade-up fade-up-delay-1">
        <div class="mc-icon">⛏️</div>
        <h2 style="font-size: clamp(2rem, 6vw, 3.5rem); margin-bottom: 5px;">
          Minecraft Server
        </h2>
      </div>

      <!-- Server IP Section Only -->
      <div class="mc-server-card fade-up fade-up-delay-2">
        <h3><i class="fas fa-server"></i> Server Information</h3>
        
        <div class="server-status">
          <div class="status-dot"></div>
          <span class="status-text">Online</span>
        </div>
        
        <div class="version-badge">Version: Newest</div>
        
        <p class="ip-label">Server IP Address</p>
        <div class="copy-ip" onclick="copyIP(this)" title="Click to copy">dminh.mcgg.nl</div>
        <p class="copy-hint"><i class="fas fa-mouse-pointer"></i> Click to copy IP</p>
      </div>

      <footer class="fade-up fade-up-delay-3" style="margin-top: 40px; padding-top: 20px;">
        © 2025 MINHLORDS • Minecraft is a trademark of Mojang Studios.<br>
        Not affiliated with Mojang AB. • <a href="index.html">Back to Home</a>
      </footer>
      
    </div>
  </div>

  <!-- Particles.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  
  <!-- Custom JS -->
  <script src="script.js"></script>
  
  <!-- Minecraft Page JS -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof particlesJS !== 'undefined') {
        particlesJS("particles-js", {
          "particles": {
            "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": ["#39ff14", "#00f2ff", "#9d4edd"] },
            "shape": { "type": ["circle"] },
            "opacity": { "value": 0.5, "random": true },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#39ff14", "opacity": 0.15, "width": 1 },
            "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false }
          },
          "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
            "modes": { "repulse": { "distance": 100, "duration": 0.4 }, "push": { "particles_nb": 4 } }
          },
          "retina_detect": true
        });
      }
    });
    
    function copyIP(element) {
      const ip = element.textContent;
      navigator.clipboard.writeText(ip).then(() => {
        element.classList.add('copied');
        element.textContent = '✓ Copied!';
        setTimeout(() => {
          element.classList.remove('copied');
          element.textContent = ip;
        }, 2000);
      });
    }
  </script>
</body>
</html>
